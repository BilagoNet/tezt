name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pytest (compat tests)
        run: pip install pytest

      - name: Build
        run: cargo build --release

      - name: Worker protocol self-test
        run: python3 python/test_worker_protocol.py

      - name: Rust tests
        run: cargo test --release
